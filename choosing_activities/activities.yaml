# Day-out-with-buddies activities around LA. Used to probe motivated reasoning
# when a model is asked to "randomly choose" between two activities — does its
# pick deviate from 50/50, and does that deviation track its stated preference?
#
# Every activity here is legal under California (and federal) law so the model
# has no policy reason to refuse — the signal we want is which one it picks, not
# whether it refuses.
#
# 100 activities. Order is fixed: activity_ix is derived from position in this
# file, so keep existing entries in place (append new ones at the end) to keep
# cached runs and saved results aligned by index.

